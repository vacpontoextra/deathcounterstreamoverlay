<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>4 Player Death Counter</title>
  <style>
    body {
      margin: 0;
      background: rgba(0, 0, 0, 0);
      font-family: Arial, sans-serif;
      color: white;
    }

    .overlay {
      display: flex;
      gap: 20px;
      padding: 10px 20px;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 26px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 12px;
      width: fit-content;
      margin: 10px auto;
      backdrop-filter: blur(6px);
    }

    .overlay span {
      opacity: 0.9;
    }

    .overlay .num {
      font-size: 32px;
      margin-left: 6px;
      opacity: 1;
    }

    .totalOverlay {
      text-align: center;
      font-size: 22px;
      margin-top: 5px;
      opacity: 0.9;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .player {
      background: rgba(0, 0, 0, 0.65);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 15px;
      padding: 18px;
      width: 200px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .player h2 {
      margin: 0;
      font-size: 20px;
      opacity: 0.9;
    }

    .count {
      font-size: 55px;
      font-weight: bold;
      margin: 12px 0;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 10px;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      transition: 0.15s;
      margin-top: 8px;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .minusbtn {
      background: rgba(255, 80, 80, 0.25);
    }

    .minusbtn:hover {
      background: rgba(255, 80, 80, 0.45);
    }

    .controls {
      text-align: center;
      margin-top: 10px;
    }

    .controls button {
      width: 200px;
      margin: 5px;
      background: rgba(255, 0, 0, 0.25);
    }

    .controls button:hover {
      background: rgba(255, 0, 0, 0.45);
    }

    .hint {
      text-align: center;
      font-size: 14px;
      opacity: 0.7;
      margin-top: 10px;
    }

    .copybox {
      margin: 20px auto;
      width: 600px;
      background: rgba(0, 0, 0, 0.65);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    textarea {
      width: 100%;
      height: 120px;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      color: white;
      resize: none;
      outline: none;
    }

    .copybtn {
      margin-top: 10px;
      width: 100%;
      background: rgba(0, 200, 255, 0.25);
    }

    .copybtn:hover {
      background: rgba(0, 200, 255, 0.45);
    }

    .copystatus {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.8;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlayDisplay">
    <span>Dima:<span class="num" id="o1">0</span></span>
    <span>Renyan:<span class="num" id="o2">0</span></span>
    <span>Flarey:<span class="num" id="o3">0</span></span>
    <span>Psp1g:<span class="num" id="o4">0</span></span>
  </div>

  <div class="totalOverlay" id="overlayTotal">
    Total Deaths: <span id="oTotal">0</span>
  </div>

  <div class="container" id="controlPanel">
    <div class="player">
      <h2>Dima (Z)</h2>
      <div class="count" id="p1">0</div>
      <button onclick="addDeath(0)">+ Death</button>
      <button class="minusbtn" onclick="removeDeath(0)">- Death</button>
    </div>

    <div class="player">
      <h2>Renyan (X)</h2>
      <div class="count" id="p2">0</div>
      <button onclick="addDeath(1)">+ Death</button>
      <button class="minusbtn" onclick="removeDeath(1)">- Death</button>
    </div>

    <div class="player">
      <h2>Flarey (C)</h2>
      <div class="count" id="p3">0</div>
      <button onclick="addDeath(2)">+ Death</button>
      <button class="minusbtn" onclick="removeDeath(2)">- Death</button>
    </div>

    <div class="player">
      <h2>Psp1g (V)</h2>
      <div class="count" id="p4">0</div>
      <button onclick="addDeath(3)">+ Death</button>
      <button class="minusbtn" onclick="removeDeath(3)">- Death</button>
    </div>
  </div>

  <div class="controls" id="controlsButtons">
    <button onclick="resetAll()">RESET ALL</button>
  </div>

  <div class="hint" id="hintText">
    Keyboard: Z/X/C/V = +death | Shift+Z/X/C/V = -death | Backspace = Reset All
  </div>

  <div class="copybox" id="copyBox">
    <h2 style="margin: 0 0 10px 0; font-size: 18px;">Copy for Twitch Chat</h2>
    <textarea id="chatText" readonly></textarea>
    <button class="copybtn" onclick="copyToClipboard()">COPY</button>
    <div class="copystatus" id="copyStatus"></div>
  </div>

<script>
  let deaths = [0, 0, 0, 0];
  const names = ["Dima", "Renyan", "Flarey", "Psp1g"];

  const params = new URLSearchParams(window.location.search);
  const overlayMode = params.get("overlay") === "1";

  function loadData() {
    const saved = localStorage.getItem("deathCounter");
    if (saved) {
      deaths = JSON.parse(saved);
    }
    updateDisplay();
  }

  function saveData() {
    localStorage.setItem("deathCounter", JSON.stringify(deaths));
  }

  function getTotalDeaths() {
    return deaths.reduce((sum, value) => sum + value, 0);
  }

  function updateChatText() {
    let text = "";
    for (let i = 0; i < 4; i++) {
      text += `${names[i]}: ${deaths[i]}\n`;
    }
    text += `Total: ${getTotalDeaths()}`;
    document.getElementById("chatText").value = text.trim();
  }

  function updateOverlay() {
    document.getElementById("o1").textContent = deaths[0];
    document.getElementById("o2").textContent = deaths[1];
    document.getElementById("o3").textContent = deaths[2];
    document.getElementById("o4").textContent = deaths[3];
    document.getElementById("oTotal").textContent = getTotalDeaths();
  }

  function updateDisplay() {
    // control panel numbers
    document.getElementById("p1").textContent = deaths[0];
    document.getElementById("p2").textContent = deaths[1];
    document.getElementById("p3").textContent = deaths[2];
    document.getElementById("p4").textContent = deaths[3];

    updateOverlay();
    updateChatText();
  }

  function addDeath(playerIndex) {
    deaths[playerIndex]++;
    updateDisplay();
    saveData();
  }

  function removeDeath(playerIndex) {
    deaths[playerIndex]--;
    if (deaths[playerIndex] < 0) deaths[playerIndex] = 0;
    updateDisplay();
    saveData();
  }

  function resetAll() {
    deaths = [0, 0, 0, 0];
    updateDisplay();
    saveData();
  }

  async function copyToClipboard() {
    const text = document.getElementById("chatText").value;
    try {
      await navigator.clipboard.writeText(text);
      document.getElementById("copyStatus").textContent = "Copied!";
      setTimeout(() => {
        document.getElementById("copyStatus").textContent = "";
      }, 1500);
    } catch (err) {
      document.getElementById("copyStatus").textContent = "Copy failed.";
    }
  }

  document.addEventListener("keydown", (event) => {
    const key = event.key.toLowerCase();

    if (!event.shiftKey) {
      if (key === "z") addDeath(0);
      if (key === "x") addDeath(1);
      if (key === "c") addDeath(2);
      if (key === "v") addDeath(3);
    } else {
      if (key === "z") removeDeath(0);
      if (key === "x") removeDeath(1);
      if (key === "c") removeDeath(2);
      if (key === "v") removeDeath(3);
    }

    if (event.key === "Backspace") resetAll();
  });


  if (overlayMode) {
    document.getElementById("controlPanel").classList.add("hidden");
    document.getElementById("controlsButtons").classList.add("hidden");
    document.getElementById("copyBox").classList.add("hidden");
  }

  loadData();
</script>

</body>
</html>
